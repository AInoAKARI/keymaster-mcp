name: keymaster-mcp
display_name: "AKARI Keymaster"
description: "Secure secret retrieval from HashiCorp Vault via Keymaster API. Let your AI agents access API keys safely."
version: "1.0.0"
author: AInoAKARI
repository: https://github.com/AInoAKARI/keymaster-mcp
license: MIT
language: typescript

credentials_mode: per_user

tools:
  - name: get_secret
    description: "Retrieve an API key by service name and key name"
  - name: healthcheck
    description: "Check Keymaster connectivity and validate all known API keys"
  - name: list_services
    description: "List all known services and their key names"

env:
  - name: USER_KEYMASTER_URL
    description: "Keymaster server URL (e.g. https://akari-vault-keymaster.onrender.com)"
    required: true
  - name: USER_KEYMASTER_TOKEN
    description: "Bearer token for Keymaster authentication"
    required: true

tags:
  - secrets
  - vault
  - security
  - api-keys
  - keymaster
