name: keymaster-mcp
display_name: "AKARI Keymaster"
description: >
  Read-only runtime secret retrieval from HashiCorp Vault via Keymaster.
  Built for autonomous agents that need API keys without putting them in .env files,
  prompts, or shell history.
version: "1.0.2"
author: AInoAKARI
repository: https://github.com/AInoAKARI/keymaster-mcp
homepage: https://github.com/AInoAKARI/keymaster-mcp
license: MIT
language: typescript

runtime: node
runtime_version: ">=18.0.0"
install: npm install -g @akari-os/keymaster-mcp
command: keymaster-mcp

credentials_mode: per_user

env:
  - name: USER_KEYMASTER_URL
    description: "Your Keymaster server URL (e.g. https://akari-vault-keymaster.onrender.com)"
    required: true
    input_type: url
  - name: USER_KEYMASTER_TOKEN
    description: "Your Bearer token for Keymaster authentication"
    required: true
    input_type: secret

tools:
  - name: get_secret
    description: "Retrieve an API key by service name and key name"
  - name: healthcheck
    description: "Check Keymaster connectivity and validate all known API keys"
  - name: list_services
    description: "List all known services and their key names"

categories:
  - security
  - developer-tools

tags:
  - secrets
  - vault
  - security
  - api-keys
  - keymaster
  - hashicorp-vault
